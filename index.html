<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3efe3">
  <meta name="apple-mobile-web-app-title" content="もりの村">
  <title>もりの村 ToDo</title>
  <!-- ?v= の番号は更新のたびに変える（ブラウザに新しいファイルを取りに行かせるため） -->
  <link rel="stylesheet" href="style.css?v=20260708c">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div class="app">
    <h1>🌲 もりの村 ToDo</h1>

    <section class="todo-area">
      <h2>今日のやること</h2>

      <div class="input-row">
        <input id="todoInput" type="text" placeholder="やることを入力">

        <select id="categorySelect">
          <option value="家事">家事</option>
          <option value="畑">畑</option>
          <option value="鶏">鶏</option>
          <option value="勉強">勉強</option>
          <option value="運動">運動</option>
          <option value="事務">事務</option>
          <option value="活動">活動</option>
          <option value="介護">介護</option>
          <option value="仕事">仕事</option>
        </select>

        <button id="addButton">追加</button>
      </div>

      <div class="calendar-row">
        <button id="importCalendarButton">📅 1週間分の予定を取り込む</button>
      </div>

      <ul id="todoList"></ul>
    </section>

    <section class="village-area">
      <h2>もりの村の状態</h2>

      <div class="status-box">
        <p>👥 村人：<span id="villagers">3</span>人</p>
        <p>🏠 家の快適度：<span id="comfort">0</span></p>
        <p>🥕 収穫物：<span id="harvest">0</span>個</p>
        <p>🐔 鶏の元気：<span id="chickenEnergy">0</span></p>
        <p>📘 知恵：<span id="wisdom">0</span></p>
        <p>💪 体力：<span id="stamina">0</span></p>
        <p>📂 整理力：<span id="officePower">0</span></p>
        <p>🌱 村の発展：<span id="development">0</span></p>
        <p>💗 思いやり：<span id="care">0</span></p>
        <p>💰 村の豊かさ：<span id="wealth">0</span></p>
        <p>⭐ 村ポイント：<span id="points">0</span></p>
      </div>

      <p id="message">ToDoを完了すると、村が少し育ちます。</p>
    </section>
  </div>

  <script src="script.js?v=20260715"></script>
</body>
</html>

<!--
| 分類 | 入れるもの                | 増えるもの    |
| -- | -------------------- | -------- |
| 家事 | 洗濯、掃除、料理、片付け、風呂、歯磨き  | 家の快適度 +1 |
| 畑  | 種まき、草取り、収穫           | 収穫物 +2   |
| 鶏  | 餌、水、小屋掃除、戸締まり        | 鶏の元気 +2  |
| 勉強 | FP、仏教の読書、ICT、記録整理    | 知恵 +1    |
| 運動 | 散歩、体操、滝行             | 体力 +1    |
| 事務 | 家計簿、書類、メール、手続き       | 整理力 +1   |
| 活動 | 大見新村、九条山、地域・プロジェクト活動 | 村の発展 +2  |
| 介護 | 介護、通院付き添い、見守り        | 思いやり +2  |
| 仕事 | ICT支援員などお金をいただく仕事    | 村の豊かさ +2 |
滝行に行く → 運動
滝行の記録を書く → 勉強
山伏の師匠の話をノートにまとめる → 勉強
滝行の会の準備をする → 活動
-->
